<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Navigator - Budget Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-light: #f8fafc;
      --card-bg: #ffffff;
      --accent: #2563eb;
      --accent-glow: rgba(37, 99, 235, 0.1);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg-light);
      color: #0f172a;
      overflow-x: hidden;
    }

    /* Glassmorphism Refined */
    .glass-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
    }

    /* Interactive Glows */
    .glow-on-hover:hover {
      box-shadow: 0 0 20px var(--accent-glow);
      border-color: var(--accent);
    }

    /* Modern Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-light); }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Telemetry Grid Line Animation */
    @keyframes scan {
      from { transform: translateY(-100%); }
      to { transform: translateY(100%); }
    }
    .scanner::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; height: 100px;
      background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
      animation: scan 4s linear infinite;
      opacity: 0.5;
      pointer-events: none;
    }

    /* AI Typing Pulse */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .ai-dot { animation: pulse 1.5s infinite; }
  </style>
</head>
<body class="selection:bg-teal-500/30 antialiased">

  <!-- Shared Header -->
  <header class="relative z-50 flex justify-between items-center px-6 sm:px-12 h-20 bg-white/80 backdrop-blur-md border-b border-slate-200">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-slate-900">travel<span class="text-blue-600">oop</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="dashboard.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Dashboard</a>
      <a href="my-trips.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">My Trips</a>
      <a href="explore.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Explore</a>
      <a href="budget.html" class="text-sm font-bold text-blue-600">Budget</a>
      <a href="Packingchecklistscreen.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Packing</a>
      <a href="Activitysearch.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Activities</a>
    </nav>
    <div class="flex items-center gap-4">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-white hover:shadow-md transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </a>
    </div>
  </header>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const Icons = {
      Wallet: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>,
      TrendingUp: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>,
      CreditCard: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>,
      Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>,
      Pie: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>,
      Robot: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
    };

    const BudgetTracker = () => {
      // Logic & Data Persistence
      const [totalBudget, setTotalBudget] = useState(() => Number(localStorage.getItem('tb_total')) || 5000);
      const [expenses, setExpenses] = useState(() => {
        const saved = localStorage.getItem('tb_expenses');
        return saved ? JSON.parse(saved) : [
          { id: 1, category: 'Flights', amount: 1200, date: '2024-05-01', desc: 'NYC to Paris' },
          { id: 2, category: 'Stay', amount: 2500, date: '2024-05-10', desc: 'Ritz Paris' },
          { id: 3, category: 'Food', amount: 450, date: '2024-05-12', desc: 'Fine dining' }
        ];
      });

      const [isAdding, setIsAdding] = useState(false);
      const [newExp, setNewExp] = useState({ category: 'Food', amount: '', desc: '' });
      const [aiSimulating, setAiSimulating] = useState(false);
      const [aiInsight, setAiInsight] = useState("Your budget looks healthy. Consider booking tours in advance to save 15%.");

      const canvasRef = useRef(null);
      const chartInstance = useRef(null);

      // Persistence
      useEffect(() => {
        localStorage.setItem('tb_total', totalBudget);
        localStorage.setItem('tb_expenses', JSON.stringify(expenses));
      }, [totalBudget, expenses]);

      const totalSpent = useMemo(() => expenses.reduce((sum, e) => sum + e.amount, 0), [expenses]);
      const remaining = totalBudget - totalSpent;
      const progress = (totalSpent / totalBudget) * 100;

      // Chart.js Setup
      useEffect(() => {
        if (canvasRef.current) {
          const ctx = canvasRef.current.getContext('2d');
          if (chartInstance.current) chartInstance.current.destroy();

          const dataByCat = expenses.reduce((acc, e) => {
            acc[e.category] = (acc[e.category] || 0) + e.amount;
            return acc;
          }, {});

          chartInstance.current = new Chart(ctx, {
            type: 'doughnut',
            data: {
              labels: Object.keys(dataByCat),
              datasets: [{
                data: Object.values(dataByCat),
                backgroundColor: ['#2dd4bf', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b'],
                borderWidth: 0,
                hoverOffset: 10
              }]
            },
            options: {
              responsive: true,
              cutout: '80%',
              plugins: { legend: { display: false } },
              animation: { animateScale: true }
            }
          });
        }
      }, [expenses]);

      const handleAddExpense = (e) => {
        e.preventDefault();
        if (!newExp.amount || !newExp.desc) return;
        const entry = {
          id: Date.now(),
          ...newExp,
          amount: Number(newExp.amount),
          date: new Date().toISOString().split('T')[0]
        };
        setExpenses([entry, ...expenses]);
        setNewExp({ category: 'Food', amount: '', desc: '' });
        setIsAdding(false);
        triggerAISimulation("New expense added.");
      };

      const triggerAISimulation = (trigger) => {
        setAiSimulating(true);
        setTimeout(() => {
          const insights = [
            "At this rate, you'll exceed your budget by day 12. Try local street food!",
            "Great job! You are 20% below your estimated daily spending limit.",
            "AI Alert: Currency fluctuations might affect your 'Stay' budget next week.",
            "Suggested: A '$500 buffer' is recommended for your upcoming 'Flights' segment."
          ];
          setAiInsight(insights[Math.floor(Math.random() * insights.length)]);
          setAiSimulating(false);
        }, 1200);
      };

      const handleReset = () => {
        if (confirm("Reset all financial data?")) {
          setExpenses([]);
          setTotalBudget(5000);
        }
      };

      return (
        <div className="relative min-h-screen px-4 py-10 sm:px-10 lg:px-20 scanner">
          
          {/* Header */}
          <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 mb-12 relative z-10">
            <div>
              <h1 className="text-4xl sm:text-6xl font-bold tracking-tighter text-slate-900">
                Budget <span className="text-blue-600">Navigator</span>
              </h1>
              <p className="text-slate-500 mt-2 font-medium tracking-wide flex items-center gap-2">
                <span className="w-2 h-2 rounded-full bg-blue-600 animate-pulse"></span>
                LIVE FINANCIAL TELEMETRY
              </p>
            </div>

            <div className="flex gap-4">
              <button 
                onClick={handleReset}
                className="px-6 py-3 rounded-2xl glass-card text-xs font-bold uppercase tracking-widest text-slate-400 hover:text-red-500 transition-colors"
              >
                Reset System
              </button>
              <button 
                onClick={() => setIsAdding(true)}
                className="px-8 py-3 rounded-2xl bg-blue-600 hover:bg-blue-500 text-white font-extrabold flex items-center gap-2 transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-500/20"
              >
                <Icons.Plus /> ADD ENTRY
              </button>
            </div>
          </div>

          <div className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 relative z-10">
            
            {/* Left Column: Visuals & Stats */}
            <div className="lg:col-span-4 space-y-8">
              
              {/* Main Total Card */}
              <div className="glass-card rounded-[2.5rem] p-8 relative overflow-hidden group">
                <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/5 rounded-full blur-3xl -mr-16 -mt-16 group-hover:bg-blue-500/10 transition-all"></div>
                <p className="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                  <Icons.Wallet /> Current Balance
                </p>
                <div className="flex items-baseline gap-2">
                  <span className="text-5xl font-bold text-slate-900">${remaining.toLocaleString()}</span>
                  <span className="text-blue-600 text-sm font-bold">USD</span>
                </div>
                
                <div className="mt-8 space-y-2">
                  <div className="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400">
                    <span>Spent: ${totalSpent}</span>
                    <span>Goal: ${totalBudget}</span>
                  </div>
                  <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div 
                      className={`h-full transition-all duration-1000 ease-out rounded-full ${progress > 90 ? 'bg-red-500' : 'bg-blue-600'}`}
                      style={{ width: `${Math.min(progress, 100)}%` }}
                    ></div>
                  </div>
                </div>

                <div className="mt-8 flex gap-3">
                    <div className="flex-1 p-4 rounded-2xl bg-slate-50 border border-slate-100">
                        <p className="text-[10px] font-bold text-slate-400 uppercase">Daily Burn</p>
                        <p className="text-xl font-bold text-slate-700">${Math.round(totalSpent / 30)}</p>
                    </div>
                    <div className="flex-1 p-4 rounded-2xl bg-blue-50 border border-blue-100">
                        <p className="text-[10px] font-bold text-blue-400 uppercase">Efficiency</p>
                        <p className="text-xl font-bold text-blue-600">92%</p>
                    </div>
                </div>
              </div>

              {/* Chart Section */}
              <div className="glass-card rounded-[2.5rem] p-8">
                <p className="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                  <Icons.Pie /> Category Allocation
                </p>
                <div className="relative h-64 flex items-center justify-center">
                  <canvas ref={canvasRef}></canvas>
                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <p className="text-xs font-bold text-slate-500 uppercase">Total Items</p>
                    <p className="text-3xl font-bold">{expenses.length}</p>
                  </div>
                </div>
                
                <div className="mt-8 space-y-3">
                    {['Flights', 'Stay', 'Food'].map(cat => (
                        <div key={cat} className="flex justify-between items-center group cursor-default">
                            <span className="text-sm font-medium text-slate-400 group-hover:text-slate-200 transition-colors">{cat}</span>
                            <span className="text-sm font-bold">${expenses.filter(e => e.category === cat).reduce((s, e) => s + e.amount, 0)}</span>
                        </div>
                    ))}
                </div>
              </div>
            </div>

            {/* Middle Column: Entries */}
            <div className="lg:col-span-5 space-y-6">
              <div className="flex justify-between items-center px-2">
                <h3 className="text-xl font-bold">Timeline</h3>
                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{expenses.length} Records found</span>
              </div>
              
              <div className="space-y-4 max-h-[700px] overflow-y-auto pr-2 custom-scroll">
                {expenses.length === 0 ? (
                    <div className="glass-card rounded-3xl p-12 text-center border-dashed border-slate-700">
                        <div className="w-16 h-16 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-800">
                            <Icons.CreditCard />
                        </div>
                        <p className="text-slate-400 font-medium">No transactions recorded yet.</p>
                    </div>
                ) : (
                    expenses.map(e => (
                        <div key={e.id} className="glass-card glow-on-hover rounded-2xl p-5 flex items-center justify-between group transition-all">
                            <div className="flex items-center gap-5">
                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center text-white font-bold ${
                                    e.category === 'Flights' ? 'bg-blue-500' :
                                    e.category === 'Stay' ? 'bg-indigo-500' : 'bg-blue-400'
                                }`}>
                                    {e.category[0]}
                                </div>
                                <div>
                                    <p className="font-bold text-lg text-slate-800 group-hover:text-blue-600 transition-colors">{e.desc}</p>
                                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">{e.category} • {e.date}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-xl font-bold text-slate-900">-${e.amount}</p>
                                <button 
                                    onClick={() => setExpenses(prev => prev.filter(x => x.id !== e.id))}
                                    className="text-[10px] font-bold text-red-500/0 group-hover:text-red-500/100 transition-all uppercase tracking-tighter"
                                >
                                    Void
                                </button>
                            </div>
                        </div>
                    ))
                )}
              </div>
            </div>

            {/* Right Column: AI Insights */}
            <div className="lg:col-span-3">
              <div className="glass-card rounded-[2.5rem] p-8 border-blue-100 bg-blue-50/50 sticky top-10">
                <div className="flex items-center gap-3 mb-6">
                  <div className="w-10 h-10 bg-blue-600/10 rounded-xl flex items-center justify-center text-blue-600 border border-blue-200">
                    <Icons.Robot />
                  </div>
                  <div>
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">AI Intelligence</p>
                    <p className="font-bold text-blue-600">Insight Alpha</p>
                  </div>
                </div>

                <div className="space-y-6">
                  <div className="p-4 rounded-2xl bg-white border border-slate-100 text-sm leading-relaxed text-slate-600 font-medium shadow-sm">
                    {aiSimulating ? (
                        <div className="flex gap-1.5 py-2">
                            <div className="w-1.5 h-1.5 bg-blue-600 rounded-full ai-dot"></div>
                            <div className="w-1.5 h-1.5 bg-blue-600 rounded-full ai-dot" style={{animationDelay: '0.2s'}}></div>
                            <div className="w-1.5 h-1.5 bg-blue-600 rounded-full ai-dot" style={{animationDelay: '0.4s'}}></div>
                        </div>
                    ) : aiInsight}
                  </div>

                  <div className="space-y-4">
                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">What-If Scenarios</p>
                    <button className="w-full p-4 rounded-xl border border-slate-800 text-left text-xs font-bold text-slate-400 hover:bg-slate-800/50 transition-all hover:border-slate-700">
                        "If I spend $500 more on Food?"
                    </button>
                    <button className="w-full p-4 rounded-xl border border-slate-800 text-left text-xs font-bold text-slate-400 hover:bg-slate-800/50 transition-all hover:border-slate-700">
                        "Upgrade my Stay segment?"
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Add Entry Modal */}
          {isAdding && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center px-4">
              <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-md" onClick={() => setIsAdding(false)}></div>
              <div className="relative glass-card rounded-[3rem] p-10 max-w-md w-full border-slate-700">
                <h2 className="text-3xl font-bold mb-8 flex items-center gap-3">
                    <Icons.Plus /> New Transaction
                </h2>
                
                <form onSubmit={handleAddExpense} className="space-y-6">
                    <div>
                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Category</label>
                        <select 
                            value={newExp.category}
                            onChange={e => setNewExp({...newExp, category: e.target.value})}
                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 outline-none focus:border-blue-500 transition-colors"
                        >
                            <option>Food</option>
                            <option>Flights</option>
                            <option>Stay</option>
                            <option>Transport</option>
                            <option>Entertainment</option>
                        </select>
                    </div>

                    <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Description</label>
                        <input 
                            type="text" 
                            placeholder="e.g. Sushi dinner"
                            value={newExp.desc}
                            onChange={e => setNewExp({...newExp, desc: e.target.value})}
                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 outline-none focus:border-blue-500 transition-colors placeholder:text-slate-300"
                        />
                    </div>

                    <div>
                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 ml-1">Amount ($)</label>
                        <input 
                            type="number" 
                            placeholder="0.00"
                            value={newExp.amount}
                            onChange={e => setNewExp({...newExp, amount: e.target.value})}
                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 outline-none focus:border-blue-500 transition-colors placeholder:text-slate-300"
                        />
                    </div>

                    <div className="pt-4 flex gap-4">
                        <button 
                            type="button"
                            onClick={() => setIsAdding(false)}
                            className="flex-1 py-4 rounded-2xl glass-card text-xs font-bold uppercase tracking-widest hover:bg-slate-800 transition-all"
                        >
                            Abort
                        </button>
                        <button 
                            type="submit"
                            className="flex-1 py-4 rounded-2xl bg-blue-600 text-white font-extrabold transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-500/20"
                        >
                            CONFIRM
                        </button>
                    </div>
                </form>
              </div>
            </div>
          )}
          {/* Floating Dashboard Button */}
          <div className="fixed bottom-10 right-10 z-50">
            <button 
                onClick={() => window.location.href = 'dashboard.html'}
                className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-2 group shadow-blue-500/20"
            >
              <svg className="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
              </svg>
              Dashboard
            </button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BudgetTracker />);
  </script>
</body>
</html>
