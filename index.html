<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safar Project Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: #0f172a;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 50px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 40px 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #0d6efd;
            box-shadow: 0 20px 25px -5px rgba(13, 110, 253, 0.15), 0 10px 10px -5px rgba(13, 110, 253, 0.04);
        }
        .card-icon {
            width: 64px;
            height: 64px;
            background: #f0f9ff;
            color: #0d6efd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .card-icon svg {
            width: 32px;
            height: 32px;
        }
        .card h2 {
            font-size: 1.5rem;
            color: #1e293b;
            font-weight: 700;
        }
        .card p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .logo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 24px;
            color: #111827;
            margin-bottom: 30px;
        }
        .logo svg {
            width: 32px;
            height: 32px;
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
            </svg>
            <span>Safar</span>
        </div>
        
        <h1>Project Files</h1>
        <p class="subtitle">Quickly navigate through the components of your web application.</p>

        <div class="grid">
            <!-- Landing Page Card -->
            <a href="landing.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        <polyline points="9 22 9 12 15 12 15 22"></polyline>
                    </svg>
                </div>
                <h2>Landing Page</h2>
                <p>The main marketing page showcasing destinations, hero section, and tour packages.</p>
            </a>

            <!-- Auth Page Card -->
            <a href="auth.html" class="card">
                <div class="card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <h2>Authentication</h2>
                <p>The beautiful glassmorphism login and registration interfaces with dynamic background.</p>
            </a>
        </div>
    </div>

</body>
</html>
