<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traveloop - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="landing.css?v=2">
    <link rel="stylesheet" href="auth.css?v=2">
    <script src="user.js"></script>
</head>
<body>
    <!-- Navigation Bar (Reused from landing page) -->
    <header class="navbar">
        <div class="nav-left">
            <a href="index.html" class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
                </svg>
                <span>travel<span style="color: #0ea5e9">oop</span></span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="#">Packages</a>
            </nav>
        </div>
        
        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Search packages...">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            <a href="auth.html#login" class="login-link">Login</a>
            <a href="auth.html#register" class="btn signup-btn">Sign Up</a>
            <button class="settings-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Auth Section with Daisy Background -->
    <main class="auth-wrapper">
        <div class="glass-card" id="register-card">
            <h2>Register</h2>
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="form-row">
                    <div class="input-group">
                        <label for="reg-name">Full Name</label>
                        <input type="text" id="reg-name" placeholder="Prasad PatiL" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-phone">Phone</label>
                        <input type="tel" id="reg-phone" placeholder="9322581165" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" placeholder="patilprasad6012@gmail.com" required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="reg-pass">Password</label>
                        <input type="password" id="reg-pass" placeholder="••••••••" required>
                    </div>
                    <div class="input-group">
                        <label for="reg-confirm">Confirm</label>
                        <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" class="auth-submit">Create Account</button>

                <div class="social-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="social-btn apple">
                        <svg viewBox="0 0 384 512" width="18" height="18" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                        Apple
                    </button>
                </div>

                <p class="auth-footer">Already have an account? <a href="#" id="show-login">Login</a></p>
            </form>
        </div>

        <!-- Login Card (Hidden by default, shown via JS) -->
        <div class="glass-card hidden" id="login-card">
            <h2>Login</h2>
            <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="johndoe@example.com" required>
                </div>

                <div class="input-group">
                    <label for="login-pass">Password</label>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>

                <div style="text-align: right; margin-bottom: 20px;">
                    <a href="#" style="color: rgba(255, 255, 255, 0.8); font-size: 13px; font-weight: 500; text-decoration: underline;">Forgot password?</a>
                </div>

                <button type="submit" class="auth-submit">Login</button>

                <div class="social-divider">
                    <span>or continue with</span>
                </div>

                <div class="social-buttons">
                    <button type="button" class="social-btn google">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                        Google
                    </button>
                    <button type="button" class="social-btn apple">
                        <svg viewBox="0 0 384 512" width="18" height="18" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                        Apple
                    </button>
                </div>

                <p class="auth-footer">Don't have an account? <a href="#" id="show-register">Register</a></p>
            </form>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAS6g1L1qJSnbDjS1MTBACjncJ4XN0UoHM",
            authDomain: "traveloop-65407.firebaseapp.com",
            projectId: "traveloop-65407",
            storageBucket: "traveloop-65407.firebasestorage.app",
            messagingSenderId: "360228717745",
            appId: "1:360228717745:web:72c68251b9c82be6894e90"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Register Form Logic
        document.querySelector('#register-card form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            if (password !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                UserProfile.login(name, email);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert(error.message);
            }
        });

        // Login Form Logic
        document.querySelector('#login-card form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const name = email.split('@')[0].split('.').map(s => s.charAt(0).toUpperCase() + s.slice(1)).join(' ');
                UserProfile.login(name, email);
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert(error.message);
            }
        });

        // Google Sign-In Logic
        document.querySelectorAll('.social-btn.google').forEach(btn => {
            btn.addEventListener('click', async () => {
                try {
                    const result = await signInWithPopup(auth, provider);
                    const user = result.user;
                    UserProfile.login(user.displayName, user.email);
                    window.location.href = 'dashboard.html';
                } catch (error) {
                    alert(error.message);
                }
            });
        });

        // Apple Sign-In Placeholder
        document.querySelectorAll('.social-btn.apple').forEach(btn => {
            btn.addEventListener('click', () => {
                alert("Apple Sign-In requires a production domain and developer account. Demo purposes only.");
            });
        });

        // Toggle UI
        const showLogin = () => {
            document.getElementById('register-card').classList.add('hidden');
            document.getElementById('login-card').classList.remove('hidden');
            window.location.hash = 'login';
        };

        const showRegister = () => {
            document.getElementById('login-card').classList.add('hidden');
            document.getElementById('register-card').classList.remove('hidden');
            window.location.hash = 'register';
        };

        document.getElementById('show-login').addEventListener('click', (e) => {
            e.preventDefault();
            showLogin();
        });

        document.getElementById('show-register').addEventListener('click', (e) => {
            e.preventDefault();
            showRegister();
        });

        // Initialize based on Hash
        window.addEventListener('load', () => {
            if (window.location.hash === '#login') {
                showLogin();
            } else {
                showRegister();
            }
        });
    </script>
</body>
</html>
