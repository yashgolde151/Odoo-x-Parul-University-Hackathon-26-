<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packing Assistant - Smart Inventory</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    /* Soft Glass Effect */
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* Checkbox Customization */
    .custom-checkbox {
      width: 24px; height: 24px;
      border: 2px solid #cbd5e1;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .custom-checkbox.checked {
      background-color: #3b82f6;
      border-color: #3b82f6;
      transform: scale(1.1);
    }

    /* Weight Bar Animation */
    .weight-fill {
      transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* Item Card Hover */
    .item-card {
      transition: all 0.3s ease;
    }
    .item-card:hover {
      background: white;
      transform: translateX(8px);
      box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.1);
    }

    /* Floating Animation for Header */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .floating { animation: float 6s ease-in-out infinite; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="selection:bg-blue-100">

  <!-- Shared Header -->
  <header class="relative z-50 flex justify-between items-center px-6 sm:px-12 h-20 bg-white/80 backdrop-blur-md border-b border-slate-200">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-slate-900">travel<span class="text-blue-600">oop</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="dashboard.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Dashboard</a>
      <a href="my-trips.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">My Trips</a>
      <a href="explore.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Explore</a>
      <a href="budget.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Budget</a>
      <a href="Packingchecklistscreen.html" class="text-sm font-bold text-blue-600">Packing</a>
      <a href="Activitysearch.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Activities</a>
    </nav>
    <div class="flex items-center gap-4">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-white hover:shadow-md transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </a>
    </div>
  </header>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const Icons = {
      Back: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>,
      Suitcase: () => <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M21 13V8a2 2 0 00-2-2H5a2 2 0 00-2 2v5m18 0v6a2 2 0 00-2 2H5a2 2 0 00-2-2v-6m18 0V9a2 2 0 00-2-2h-2M5 13V9a2 2 0 012-2h2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v2m-6 0h6"></path></svg>,
      Scale: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"></path></svg>,
      Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>,
      Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
      Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>,
      Bell: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>,
      Volume: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
    };

    const INITIAL_ITEMS = [
      { id: 1, name: "Passport & Documents", category: "Essentials", weight: 0.1, packed: true },
      { id: 2, name: "Noise Cancelling Headphones", category: "Electronics", weight: 0.4, packed: false },
      { id: 3, name: "Universal Travel Adapter", category: "Electronics", weight: 0.2, packed: false },
      { id: 4, name: "Down Jacket", category: "Clothing", weight: 0.8, packed: false },
      { id: 5, name: "Walking Shoes", category: "Clothing", weight: 1.2, packed: false },
      { id: 6, name: "Toiletries Kit", category: "Essentials", weight: 0.6, packed: false }
    ];

    const PackingAssistant = () => {
      const [items, setItems] = useState(() => {
        try {
          const saved = localStorage.getItem('pa_items');
          if (!saved) return INITIAL_ITEMS;
          const parsed = JSON.parse(saved);
          return Array.isArray(parsed) ? parsed : INITIAL_ITEMS;
        } catch (e) {
          return INITIAL_ITEMS;
        }
      });
      const [activeCategory, setActiveCategory] = useState('All');
      const [newItemName, setNewItemName] = useState('');
      const [maxWeight, setMaxWeight] = useState(23); // Standard airline limit
      const [upcomingTrip, setUpcomingTrip] = useState(null);
      const [showNotification, setShowNotification] = useState(false);

      // Notification Logic
      useEffect(() => {
        const savedTrips = localStorage.getItem('globalTrips');
        if (savedTrips) {
          const trips = JSON.parse(savedTrips);
          const upcoming = trips.find(t => t.status === 'Upcoming');
          if (upcoming) {
            setUpcomingTrip(upcoming);
            // In a real app, we'd check if Date.now() is exactly tripDate - 5h
            // For the demo, we'll auto-trigger if they haven't seen it this session
          }
        }
      }, []);

      const triggerVoiceNotification = () => {
        if (!upcomingTrip) return;
        const message = `Reminder: Your trip to ${upcomingTrip.name} starts in five hours. Please ensure your packing list is complete.`;
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.pitch = 1.1;
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
        setShowNotification(true);
      };

      useEffect(() => {
        try {
          localStorage.setItem('pa_items', JSON.stringify(items));
        } catch (e) {
          console.error("Storage failed", e);
        }
      }, [items]);

      const categories = ['All', 'Essentials', 'Clothing', 'Electronics', 'Misc'];

      const totalWeight = useMemo(() => 
        items.reduce((sum, item) => sum + (item.packed ? item.weight : 0), 0).toFixed(1),
      [items]);

      const togglePack = (id) => {
        setItems(items.map(item => 
          item.id === id ? { ...item, packed: !item.packed } : item
        ));
      };

      const addItem = (e) => {
        e.preventDefault();
        if (!newItemName.trim()) return;
        const item = {
          id: Date.now(),
          name: newItemName,
          category: activeCategory === 'All' ? 'Misc' : activeCategory,
          weight: 0.5, // Default weight
          packed: false
        };
        setItems([...items, item]);
        setNewItemName('');
      };

      const removeItem = (id) => {
        setItems(items.filter(item => item.id !== id));
      };

      const weightPercentage = Math.min((totalWeight / maxWeight) * 100, 100);

      return (
        <div className="min-h-screen bg-slate-50/50 pb-20">
          
          {/* Header Section */}
          <div className="bg-white border-b border-slate-200 pt-12 pb-8 px-6 sm:px-12">
            <div className="max-w-4xl mx-auto">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-10">
                <div className="flex items-center gap-6">
                  <div className="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center text-white shadow-xl shadow-blue-500/30 floating shrink-0">
                    <Icons.Suitcase />
                  </div>
                  <div>
                    <h1 className="text-4xl md:text-5xl font-black tracking-tight text-slate-900 mb-2">Packing Assistant</h1>
                    <p className="text-slate-500 font-bold flex items-center gap-2">
                      <span className="w-3 h-3 bg-blue-600 rounded-full animate-pulse"></span>
                      WEIGHT-AWARE INVENTORY
                    </p>
                  </div>
                </div>
                
                <div className="flex gap-4 w-full md:w-auto">
                  <button 
                    onClick={triggerVoiceNotification}
                    className="flex-1 md:flex-none px-6 py-3 rounded-2xl bg-blue-50 text-blue-600 font-bold hover:bg-blue-100 transition-all flex items-center justify-center gap-2 border border-blue-200"
                  >
                    <Icons.Volume /> Simulate 5h Voice
                  </button>
                  <div className="flex-1 md:flex-none px-6 py-3 rounded-2xl bg-white border border-slate-200 shadow-sm flex items-center justify-center gap-4">
                    <Icons.Scale />
                    <div className="text-right">
                      <p className="text-[10px] font-bold text-slate-400 uppercase">Current Load</p>
                      <p className={`text-xl font-black ${Number(totalWeight) > maxWeight ? 'text-red-500' : 'text-blue-600'}`}>
                        {totalWeight} <span className="text-xs">/ {maxWeight}kg</span>
                      </p>
                    </div>
                  </div>
                </div>
              </div>

              {/* Trip Notification Bar */}
              {showNotification && upcomingTrip && (
                <div className="animate-fade-in-up">
                  <div className="bg-blue-600 rounded-3xl p-6 text-white shadow-xl shadow-blue-500/20 flex flex-col md:flex-row items-center justify-between gap-6">
                    <div className="flex items-center gap-4">
                      <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center shrink-0">
                        <Icons.Bell />
                      </div>
                      <div>
                        <h3 className="font-bold text-lg leading-tight">Departure Imminent!</h3>
                        <p className="text-blue-100 text-sm font-medium">Your trip "{upcomingTrip.name}" starts in 5 hours. Double check your essentials!</p>
                      </div>
                    </div>
                    <button 
                      onClick={() => setShowNotification(false)}
                      className="w-full md:w-auto px-8 py-3 bg-white text-blue-600 rounded-2xl font-bold text-sm hover:bg-blue-50 transition-all shadow-lg"
                    >
                      Dismiss
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>

          <div className="max-w-4xl mx-auto px-6 sm:px-12 mt-12">
            
            <div className="flex flex-col md:flex-row gap-10">
              
              {/* Weight Dashboard */}
              <div className="glass-panel rounded-3xl p-6 w-full md:w-72 shadow-sm h-fit">
                <div className="flex justify-between items-center mb-3">
                  <div className="flex items-center gap-2 text-slate-500 text-sm font-bold uppercase tracking-wider">
                    <Icons.Scale /> Luggage Load
                  </div>
                  <span className={`font-black text-lg ${weightPercentage > 90 ? 'text-red-500' : 'text-blue-600'}`}>
                    {totalWeight}kg
                  </span>
                </div>
                <div className="h-3 w-full bg-slate-200 rounded-full overflow-hidden">
                  <div 
                    className={`h-full weight-fill rounded-full ${weightPercentage > 90 ? 'bg-red-500' : 'bg-blue-600'}`}
                    style={{ width: `${weightPercentage}%` }}
                  ></div>
                </div>
                <p className="text-[10px] text-slate-400 font-bold uppercase mt-3 tracking-widest text-right">
                  Capacity: {maxWeight}kg
                </p>
              </div>

            </div>
          </div>

          <div className="max-w-4xl mx-auto px-6 py-12">
            
            {/* Control Bar */}
            <div className="flex flex-col sm:flex-row justify-between items-center gap-6 mb-12">
              
              <div className="flex bg-white p-1.5 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto w-full sm:w-auto">
                {categories.map(cat => (
                  <button
                    key={cat}
                    onClick={() => setActiveCategory(cat)}
                    className={`px-6 py-2.5 rounded-xl text-sm font-bold transition-all whitespace-nowrap ${
                      activeCategory === cat 
                        ? 'bg-blue-600 text-white shadow-md' 
                        : 'text-slate-500 hover:text-slate-900 hover:bg-slate-50'
                    }`}
                  >
                    {cat}
                  </button>
                ))}
              </div>

              <form onSubmit={addItem} className="relative w-full sm:w-80 group">
                <input 
                  type="text" 
                  value={newItemName}
                  onChange={(e) => setNewItemName(e.target.value)}
                  placeholder="Quick add item..."
                  className="w-full bg-white border border-slate-200 rounded-2xl py-3.5 pl-5 pr-12 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium placeholder:text-slate-300"
                />
                <button 
                  type="submit"
                  className="absolute right-2 top-2 p-1.5 bg-slate-900 text-white rounded-xl hover:bg-blue-600 transition-colors shadow-sm"
                >
                  <Icons.Plus />
                </button>
              </form>

            </div>

            {/* Items List */}
            <div className="space-y-4">
              {items
                .filter(item => activeCategory === 'All' || item.category === activeCategory)
                .map((item, idx) => (
                <div 
                  key={item.id} 
                  className={`item-card flex items-center justify-between p-5 rounded-3xl border border-slate-200 glass-panel ${item.packed ? 'opacity-60 grayscale' : ''}`}
                  style={{ transitionDelay: `${idx * 50}ms` }}
                >
                  <div className="flex items-center gap-6">
                    <div 
                      onClick={() => togglePack(item.id)}
                      className={`custom-checkbox ${item.packed ? 'checked' : ''}`}
                    >
                      {item.packed && <Icons.Check />}
                    </div>
                    <div>
                      <h3 className={`font-bold text-lg ${item.packed ? 'line-through text-slate-400' : 'text-slate-900'}`}>
                        {item.name}
                      </h3>
                      <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mt-0.5">
                        {item.category} • {item.weight}kg
                      </p>
                    </div>
                  </div>

                  <button 
                    onClick={() => removeItem(item.id)}
                    className="p-3 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-2xl transition-all"
                  >
                    <Icons.Trash />
                  </button>
                </div>
              ))}
            </div>

            {/* Empty State */}
            {items.filter(item => activeCategory === 'All' || item.category === activeCategory).length === 0 && (
              <div className="text-center py-24 bg-white/40 rounded-[3rem] border border-dashed border-slate-200">
                <div className="text-4xl mb-4 opacity-20">🎒</div>
                <h3 className="text-xl font-bold text-slate-400">Empty list. Ready to pack?</h3>
              </div>
            )}

          </div>

          {/* Floating Dashboard Button */}
          <div className="fixed bottom-10 right-10 z-50">
            <button 
                onClick={() => window.location.href = 'dashboard.html'}
                className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-2 group shadow-blue-500/20"
            >
              <svg className="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
              </svg>
              Dashboard
            </button>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PackingAssistant />);
  </script>
</body>
</html>
