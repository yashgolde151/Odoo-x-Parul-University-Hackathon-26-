<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Floating Discovery - City Search</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      overflow-x: hidden;
    }

    /* Drifting Entrance Animation */
    @keyframes driftIn {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .animate-drift {
      opacity: 0;
      animation: driftIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Hover Glow Effect */
    .city-card {
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      background: white;
      border: 1px solid #e2e8f0;
    }
    
    .city-card:hover {
      transform: translateY(-16px);
      box-shadow: 0 25px 60px -15px var(--hover-color), 0 0 20px -5px var(--hover-color);
      border-color: #3b82f6;
    }

    /* Add to Trip Button pulse */
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
      50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
    }

    .btn-add:hover {
      animation: pulseGlow 1.5s infinite;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f8fafc; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {}
      }
    }
  </script>
</head>
<body class="antialiased selection:bg-cyan-500/30">
  
  <!-- Shared Header -->
  <header class="relative z-50 flex justify-between items-center px-6 sm:px-12 h-20 bg-white/80 backdrop-blur-md border-b border-slate-200">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-slate-900">travel<span class="text-blue-600">oop</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="dashboard.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Dashboard</a>
      <a href="my-trips.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">My Trips</a>
      <a href="explore.html" class="text-sm font-bold text-blue-600">Explore</a>
      <a href="budget.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Budget</a>
      <a href="Packingchecklistscreen.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Packing</a>
      <a href="Activitysearch.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Activities</a>
    </nav>
    <div class="flex items-center gap-4">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-white hover:shadow-md transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </a>
    </div>
  </header>

  <div id="root" class="min-h-screen"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>,
      Plus: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>,
      Check: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>,
      Star: () => <svg className="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
    };

    const INITIAL_CITIES = [
      // Asia
      { id: "tokyo", name: "Tokyo", country: "Japan", region: "Asia", cost: "$$$", pop: "4.9", color: "rgba(59, 130, 246, 0.6)", image: "https://loremflickr.com/800/600/Tokyo,landmark/all?lock=10" },
      { id: "kyoto", name: "Kyoto", country: "Japan", region: "Asia", cost: "$$$", pop: "4.8", color: "rgba(236, 72, 153, 0.6)", image: "https://loremflickr.com/800/600/Kyoto,temple/all?lock=10" },
      { id: "bali", name: "Bali", country: "Indonesia", region: "Asia", cost: "$", pop: "4.7", color: "rgba(34, 197, 94, 0.6)", image: "https://loremflickr.com/800/600/Bali,landmark/all?lock=11" },
      { id: "bangkok", name: "Bangkok", country: "Thailand", region: "Asia", cost: "$", pop: "4.6", color: "rgba(245, 158, 11, 0.6)", image: "https://loremflickr.com/800/600/Bangkok,landmark/all?lock=12" },
      { id: "dubai", name: "Dubai", country: "UAE", region: "Middle East", cost: "$$$$", pop: "4.5", color: "rgba(234, 179, 8, 0.6)", image: "https://loremflickr.com/800/600/Dubai,landmark/all?lock=13" },
      
      // Europe
      { id: "paris", name: "Paris", country: "France", region: "Europe", cost: "$$$", pop: "4.8", color: "rgba(244, 63, 94, 0.6)", image: "https://loremflickr.com/800/600/Paris,Eiffel/all?lock=14" },
      { id: "rome", name: "Rome", country: "Italy", region: "Europe", cost: "$$", pop: "4.6", color: "rgba(249, 115, 22, 0.6)", image: "https://loremflickr.com/800/600/Rome,Colosseum/all?lock=15" },
      { id: "london", name: "London", country: "UK", region: "Europe", cost: "$$$$", pop: "4.7", color: "rgba(59, 130, 246, 0.6)", image: "https://loremflickr.com/800/600/London,landmark/all?lock=16" },
      { id: "barcelona", name: "Barcelona", country: "Spain", region: "Europe", cost: "$$", pop: "4.8", color: "rgba(239, 68, 68, 0.6)", image: "https://loremflickr.com/800/600/Barcelona,landmark/all?lock=17" },
      { id: "amsterdam", name: "Amsterdam", country: "Netherlands", region: "Europe", cost: "$$$", pop: "4.7", color: "rgba(249, 115, 22, 0.6)", image: "https://loremflickr.com/800/600/Amsterdam,landmark/all?lock=18" },
      { id: "santorini", name: "Santorini", country: "Greece", region: "Europe", cost: "$$$", pop: "4.9", color: "rgba(56, 189, 248, 0.6)", image: "https://loremflickr.com/800/600/Santorini,landmark/all?lock=19" },

      // Americas
      { id: "ny", name: "New York", country: "USA", region: "Americas", cost: "$$$$", pop: "4.8", color: "rgba(59, 130, 246, 0.6)", image: "https://loremflickr.com/800/600/NewYork,landmark/all?lock=20" },
      { id: "sf", name: "San Francisco", country: "USA", region: "Americas", cost: "$$$$", pop: "4.6", color: "rgba(239, 68, 68, 0.6)", image: "https://loremflickr.com/800/600/SanFrancisco,landmark/all?lock=21" },
      { id: "rio", name: "Rio de Janeiro", country: "Brazil", region: "Americas", cost: "$$", pop: "4.7", color: "rgba(34, 197, 94, 0.6)", image: "https://loremflickr.com/800/600/Rio,landmark/all?lock=22" },
      { id: "cancun", name: "Cancun", country: "Mexico", region: "Americas", cost: "$$$", pop: "4.6", color: "rgba(14, 165, 233, 0.6)", image: "https://loremflickr.com/800/600/Cancun,beach/all?lock=23" },

      // Africa
      { id: "cpt", name: "Cape Town", country: "South Africa", region: "Africa", cost: "$$", pop: "4.7", color: "rgba(168, 85, 247, 0.6)", image: "https://loremflickr.com/800/600/CapeTown,landmark/all?lock=24" },
      { id: "cairo", name: "Cairo", country: "Egypt", region: "Africa", cost: "$", pop: "4.5", color: "rgba(217, 119, 6, 0.6)", image: "https://loremflickr.com/800/600/Cairo,pyramids/all?lock=25" },
      { id: "marrakech", name: "Marrakech", country: "Morocco", region: "Africa", cost: "$$", pop: "4.6", color: "rgba(190, 18, 60, 0.6)", image: "https://loremflickr.com/800/600/Marrakech,medina/all?lock=26" },

      // Oceania
      { id: "syd", name: "Sydney", country: "Australia", region: "Oceania", cost: "$$$", pop: "4.8", color: "rgba(20, 184, 166, 0.6)", image: "https://loremflickr.com/800/600/Sydney,landmark/all?lock=27" },
      { id: "auckland", name: "Auckland", country: "New Zealand", region: "Oceania", cost: "$$$", pop: "4.7", color: "rgba(16, 185, 129, 0.6)", image: "https://loremflickr.com/800/600/Auckland,landmark/all?lock=28" },
    ];

    const FloatingSearch = () => {
      const [searchQuery, setSearchQuery] = useState("");
      const [addedCities, setAddedCities] = useState(new Set());
      const [isFocused, setIsFocused] = useState(false);
      const [selectedRegion, setSelectedRegion] = useState('All');
      const [cities, setCities] = useState(INITIAL_CITIES);
      const [isGenerating, setIsGenerating] = useState(false);

      const regions = ['All', ...new Set(cities.map(c => c.region))];

      const handleAIGenerate = () => {
        if (!searchQuery.trim()) return;
        setIsGenerating(true);
        
        setTimeout(() => {
          const newCity = {
            id: `ai-${Date.now()}`,
            name: searchQuery.trim(),
            country: "AI Generated",
            region: "AI Discoveries",
            cost: "$$".repeat(Math.ceil(Math.random() * 3) + 1),
            pop: (Math.random() * (5.0 - 4.5) + 4.5).toFixed(1),
            color: "rgba(168, 85, 247, 0.6)", // AI Violet
            image: `https://loremflickr.com/800/600/${encodeURIComponent(searchQuery)},landmark/all?lock=${Date.now()}`
          };
          
          setCities(prev => [newCity, ...prev]);
          setSearchQuery('');
          setIsGenerating(false);
          setSelectedRegion('AI Discoveries');
        }, 1500);
      };

      const handleAdd = (e, cityObj) => {
        e.stopPropagation();
        
        // Update local UI state
        setAddedCities(prev => {
          const newSet = new Set(prev);
          newSet.add(cityObj.id);
          return newSet;
        });

        // Format dates for the mock trip
        const start = new Date();
        start.setDate(start.getDate() + Math.floor(Math.random() * 30) + 10);
        const end = new Date(start);
        end.setDate(end.getDate() + Math.floor(Math.random() * 7) + 3);
        const formatOptions = { day: '2-digit', month: 'short' };
        
        const newTrip = {
          id: Date.now(),
          name: `Trip to ${cityObj.name}`,
          startDate: start.toLocaleDateString('en-GB', formatOptions),
          endDate: end.toLocaleDateString('en-GB', formatOptions),
          citiesCount: 1,
          status: 'Upcoming',
          imageUrl: cityObj.image
        };

        // Persist to localStorage
        const existingTripsStr = localStorage.getItem('globalTrips');
        let existingTrips = [];
        if (existingTripsStr) {
            existingTrips = JSON.parse(existingTripsStr);
        }
        
        existingTrips = [newTrip, ...existingTrips];
        localStorage.setItem('globalTrips', JSON.stringify(existingTrips));
        
        // Add a nice delay for the checkmark animation, then redirect
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 800);
      };

      const filteredCities = cities.filter(c => {
        const matchesSearch = c.name.toLowerCase().includes(searchQuery.toLowerCase()) || c.country.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesRegion = selectedRegion === 'All' || c.region === selectedRegion;
        return matchesSearch && matchesRegion;
      });

      return (
        <div className="relative min-h-screen pb-24">
          
          {/* Ambient Background Glows */}
          <div className="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-blue-500/5 blur-[120px] pointer-events-none"></div>
          <div className="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-indigo-500/5 blur-[120px] pointer-events-none"></div>

          {/* Floating Capsule Search Bar */}
          <div className="sticky top-6 sm:top-10 z-50 px-4 sm:px-0 flex justify-center w-full max-w-2xl mx-auto mb-16 sm:mb-24 text-slate-900">
            <div className={`relative w-full transition-all duration-300 ${isFocused ? 'scale-105 sm:scale-110' : 'scale-100'}`}>
              
              {/* Outer Glow Ring on Focus */}
              <div className={`absolute inset-0 rounded-full transition-opacity duration-300 pointer-events-none ${isFocused ? 'opacity-100 shadow-[0_0_30px_rgba(59,130,246,0.3)]' : 'opacity-0'}`}></div>
              
              <div className="relative flex items-center bg-white border border-slate-200 rounded-full p-2 shadow-2xl overflow-hidden group">
                
                <div className={`pl-4 pr-2 text-slate-400 transition-colors ${isFocused ? 'text-blue-500' : 'group-hover:text-blue-400'}`}>
                  <Icons.Search />
                </div>
                
                <input 
                  type="text" 
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  onFocus={() => setIsFocused(true)}
                  onBlur={() => setIsFocused(false)}
                  placeholder="Where do you want to go?" 
                  className="w-full bg-transparent border-none outline-none text-slate-900 placeholder-slate-300 text-lg sm:text-xl py-3 px-2 font-medium"
                />
                
                {searchQuery && (
                  <button 
                    onClick={() => setSearchQuery("")}
                    className="pr-4 pl-2 text-slate-400 hover:text-slate-600 transition-colors text-sm font-bold uppercase tracking-widest"
                  >
                    Clear
                  </button>
                )}
              </div>
            </div>

            {/* Region / Country Filter Pills */}
            <div className="flex flex-wrap justify-center gap-2 sm:gap-3 mt-6">
              {regions.map(region => (
                <button
                  key={region}
                  onClick={() => setSelectedRegion(region)}
                  className={`px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold transition-all border ${
                    selectedRegion === region 
                      ? 'bg-blue-600 border-blue-500 text-white shadow-lg shadow-blue-500/20' 
                      : 'bg-white border-slate-200 text-slate-500 hover:text-blue-600 hover:border-blue-400 backdrop-blur-md shadow-sm'
                  }`}
                >
                  {region}
                </button>
              ))}
            </div>
          </div>

          {/* Main Grid for Suspended Tiles */}
          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 lg:gap-10">
              
              {filteredCities.map((city, index) => {
                const isAdded = addedCities.has(city.id);
                
                return (
                  <div 
                    key={city.id}
                    className="animate-drift city-card group relative rounded-[2rem] overflow-hidden bg-slate-800 border border-slate-700/50 shadow-xl cursor-pointer"
                    style={{ 
                      animationDelay: `${index * 100}ms`,
                      '--hover-color': city.color 
                    }}
                  >
                    {/* Aspect Ratio Container */}
                    <div className="relative aspect-[4/5] w-full overflow-hidden">
                      {/* Image with subtle zoom on hover */}
                      <img 
                        src={city.image} 
                        alt={city.name} 
                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                      />
                      
                      {/* Dark Gradient Overlay */}
                      <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent opacity-80 group-hover:opacity-60 transition-opacity duration-300"></div>
                      
                      {/* Data Pills (Top Left) */}
                      <div className="absolute top-4 left-4 right-4 flex flex-wrap gap-2 pointer-events-none">
                        <div className="bg-white/90 backdrop-blur-md px-3 py-1 rounded-full border border-slate-200 text-slate-900 text-xs font-bold shadow-sm">
                          {city.country}
                        </div>
                        <div className="bg-blue-600/90 backdrop-blur-md px-3 py-1 rounded-full border border-blue-400 text-white text-xs font-bold shadow-sm">
                          {city.cost}
                        </div>
                        <div className="bg-white/90 backdrop-blur-md px-3 py-1 rounded-full border border-slate-200 text-yellow-600 text-xs font-bold flex items-center gap-1 shadow-sm">
                          <Icons.Star /> {city.pop}
                        </div>
                      </div>

                      {/* Add to Trip Interactive Button (Center/Hover) */}
                      <div className="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                        <button 
                          onClick={(e) => handleAdd(e, city)}
                          disabled={isAdded}
                          className={`btn-add flex items-center justify-center w-16 h-16 rounded-full text-white transition-all duration-300 ${
                            isAdded 
                              ? 'bg-emerald-500 scale-110 shadow-[0_0_30px_rgba(16,185,129,0.5)]' 
                              : 'bg-blue-600/90 backdrop-blur-md border-2 border-blue-400 shadow-lg hover:bg-blue-500'
                          }`}
                        >
                          {isAdded ? <Icons.Check /> : <Icons.Plus />}
                        </button>
                      </div>

                      {/* City Name (Bottom) */}
                      <div className="absolute bottom-0 left-0 w-full p-6 pointer-events-none">
                        <h2 className="text-3xl sm:text-4xl font-bold text-white tracking-tight mb-1">
                          {city.name}
                        </h2>
                        {/* Subtle interactive underline effect */}
                        <div className="w-0 h-1 bg-cyan-400 rounded-full transition-all duration-500 group-hover:w-1/3"></div>
                      </div>

                    </div>
                  </div>
                );
              })}
            </div>
            
            {/* AI Generation State Overlay */}
            {isGenerating && (
              <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm animate-in fade-in">
                <div className="flex flex-col items-center bg-slate-800 p-8 sm:p-12 rounded-3xl border border-slate-700 shadow-2xl">
                  <div className="w-16 h-16 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                  <h3 className="text-2xl sm:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 mb-2 animate-pulse text-center">
                    AI is discovering "{searchQuery}"...
                  </h3>
                  <p className="text-slate-400 text-center font-medium">Analyzing global data & fetching photos.</p>
                </div>
              </div>
            )}

            {/* Empty State / AI Generation Prompt */}
            {filteredCities.length === 0 && !isGenerating && (
              <div className="text-center py-16 sm:py-24 animate-drift">
                <div className="text-6xl mb-6">✨</div>
                <h3 className="text-2xl sm:text-3xl font-bold text-white mb-3">Destination not found</h3>
                <p className="text-slate-400 mb-8 max-w-md mx-auto font-medium">We couldn't find "{searchQuery}" in our curated list, but our AI can discover it for you instantly.</p>
                <button 
                  onClick={handleAIGenerate}
                  className="group relative px-8 py-4 bg-white rounded-full font-bold text-slate-900 overflow-hidden transition-all hover:scale-105 shadow-lg border border-slate-200"
                >
                  <div className="absolute inset-0 bg-gradient-to-r from-blue-500 to-indigo-600 opacity-10 group-hover:opacity-20 transition-opacity"></div>
                  <div className="relative flex items-center justify-center gap-3">
                    <Icons.Star />
                    <span>Use AI to Discover "{searchQuery}"</span>
                  </div>
                </button>
              </div>
            )}

            {/* AI Prompt (When results exist but user might want something else) */}
            {filteredCities.length > 0 && searchQuery && !isGenerating && (
              <div className="mt-16 mb-8 text-center animate-drift bg-white border border-slate-200 rounded-3xl p-8 max-w-2xl mx-auto shadow-sm">
                <p className="text-slate-500 mb-4 font-medium">Didn't find exactly what you were looking for?</p>
                <button 
                  onClick={handleAIGenerate}
                  className="group relative px-6 py-3 bg-white border border-slate-200 rounded-full font-bold text-slate-900 overflow-hidden transition-all hover:scale-105 shadow-md inline-block"
                >
                  <div className="absolute inset-0 bg-gradient-to-r from-blue-500 to-indigo-600 opacity-10 group-hover:opacity-20 transition-opacity"></div>
                  <div className="relative flex items-center justify-center gap-2 text-sm">
                    <Icons.Star />
                    <span>Use AI to generate "{searchQuery}"</span>
                  </div>
                </button>
              </div>
            )}
            
          </main>

          {/* Floating Dashboard Button */}
          <div className="fixed bottom-10 right-10 z-50">
            <button 
                onClick={() => window.location.href = 'dashboard.html'}
                className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-2 group shadow-blue-500/20"
            >
              <svg className="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
              </svg>
              Dashboard
            </button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FloatingSearch />);
  </script>
</body>
</html>
