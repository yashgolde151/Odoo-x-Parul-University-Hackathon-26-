<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Activities - Adventure Finder</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Clash Display', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
    }

    /* Modern Blue Cards */
    .activity-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .activity-card:hover {
      background: #fff;
      border-color: #3b82f6;
      transform: translateY(-8px);
      box-shadow: 0 20px 40px -20px rgba(59, 130, 246, 0.2);
    }

    /* Horizontal Scroll for Categories */
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

    /* AI Magic Glow */
    .ai-glow {
      background: linear-gradient(90deg, #3b82f6, #60a5fa, #3b82f6);
      background-size: 200% auto;
      animation: shine 3s linear infinite;
    }
    @keyframes shine {
      to { background-position: 200% center; }
    }

    /* Booking Button */
    .btn-book {
      position: relative;
      overflow: hidden;
    }
    .btn-book::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }
    .btn-book:hover::after {
      left: 100%;
    }
  </style>
</head>
<body class="selection:bg-blue-100 antialiased">

  <!-- Shared Header -->
  <header class="relative z-50 flex justify-between items-center px-6 sm:px-12 h-20 bg-white/80 backdrop-blur-md border-b border-slate-100">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-slate-900">travel<span class="text-blue-600">oop</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="dashboard.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Dashboard</a>
      <a href="my-trips.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">My Trips</a>
      <a href="explore.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Explore</a>
      <a href="budget.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Budget</a>
      <a href="Packingchecklistscreen.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Packing</a>
      <a href="Activitysearch.html" class="text-sm font-bold text-blue-600">Activities</a>
    </nav>
    <div class="flex items-center gap-4">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-white hover:shadow-md transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </a>
    </div>
  </header>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const Icons = {
      Search: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>,
      Map: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>,
      Clock: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
      Star: () => <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>,
      Ticket: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
    };

    const ACTIVITIES = [
      { id: 1, title: "Grand Palace History Tour", location: "Bangkok, Thailand", price: 45, rating: 4.8, category: "History", image: "https://loremflickr.com/800/1000/Bangkok,palace/all?lock=1" },
      { id: 2, title: "Tsukiji Market Sushi Class", location: "Tokyo, Japan", price: 120, rating: 4.9, category: "Food", image: "https://loremflickr.com/800/1000/Tokyo,sushi/all?lock=2" },
      { id: 3, title: "Northern Lights Expedition", location: "Tromsø, Norway", price: 180, rating: 4.7, category: "Adventure", image: "https://loremflickr.com/800/1000/Norway,northernlights/all?lock=3" },
      { id: 4, title: "Amalfi Coast Boat Cruise", location: "Positano, Italy", price: 95, rating: 4.9, category: "Relax", image: "https://loremflickr.com/800/1000/Positano,boat/all?lock=4" },
      { id: 5, title: "Dune Bashing Safari", location: "Dubai, UAE", price: 65, rating: 4.6, category: "Adventure", image: "https://loremflickr.com/800/1000/Dubai,desert/all?lock=5" },
      { id: 6, title: "Louvre Museum Night Pass", location: "Paris, France", price: 35, rating: 4.8, category: "Culture", image: "https://loremflickr.com/800/1000/Paris,Louvre/all?lock=6" }
    ];

    const ActivityExplorer = () => {
      const [searchQuery, setSearchQuery] = useState("");
      const [activeTab, setActiveTab] = useState("All");
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        setTimeout(() => setIsLoading(false), 800);
      }, []);

      const categories = ["All", "History", "Food", "Adventure", "Relax", "Culture"];

      const filteredActivities = ACTIVITIES.filter(a => {
        const matchesTab = activeTab === "All" || a.category === activeTab;
        const matchesSearch = a.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                             a.location.toLowerCase().includes(searchQuery.toLowerCase());
        return matchesTab && matchesSearch;
      });

      return (
        <div className="min-h-screen">
          
          {/* Header & Search */}
          <div className="max-w-7xl mx-auto px-6 pt-12 pb-24">
            <div className="flex flex-col md:flex-row justify-between items-end gap-12">
              <div className="max-w-2xl">
                <h1 className="text-6xl md:text-8xl font-bold tracking-tighter mb-6 text-slate-900">
                  Discover <span className="text-blue-600 italic">Moments</span>
                </h1>
                <p className="text-slate-500 text-xl font-medium max-w-lg">
                  Handpicked experiences and hidden gems recommended by locals and AI curators.
                </p>
              </div>

              <div className="w-full md:w-[400px] relative group">
                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-blue-400 rounded-2xl blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
                <div className="relative bg-white border border-slate-200 rounded-2xl p-2 flex items-center shadow-sm">
                  <div className="pl-4 text-slate-400"><Icons.Search /></div>
                  <input 
                    type="text" 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    placeholder="Search by city or activity..." 
                    className="w-full bg-transparent border-none outline-none py-3 px-4 text-slate-900 font-medium placeholder-slate-300"
                  />
                </div>
              </div>
            </div>

            {/* Categories Navigation */}
            <div className="mt-20 flex gap-4 overflow-x-auto hide-scroll pb-4 border-b border-slate-100">
              {categories.map(cat => (
                <button
                  key={cat}
                  onClick={() => setActiveTab(cat)}
                  className={`px-8 py-3 rounded-full text-sm font-bold transition-all whitespace-nowrap border ${
                    activeTab === cat 
                    ? 'bg-blue-600 text-white border-blue-600 shadow-lg shadow-blue-500/20' 
                    : 'bg-white text-slate-500 border-slate-200 hover:text-blue-600 hover:border-blue-400'
                  }`}
                >
                  {cat}
                </button>
              ))}
            </div>

            {/* Activities Grid */}
            {isLoading ? (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mt-16">
                {[1,2,3].map(i => (
                  <div key={i} className="aspect-[4/5] bg-zinc-900/50 animate-pulse rounded-3xl"></div>
                ))}
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 mt-16">
                {filteredActivities.map((act) => (
                  <div key={act.id} className="activity-card group rounded-[2.5rem] overflow-hidden flex flex-col">
                    <div className="relative aspect-[4/5] overflow-hidden">
                      <img 
                        src={act.image} 
                        alt={act.title}
                        className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                      />
                      <div className="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent opacity-80"></div>
                      
                      {/* Price Badge */}
                      <div className="absolute top-6 right-6 bg-white text-black px-4 py-2 rounded-2xl font-black text-lg">
                        ${act.price}
                      </div>

                      {/* Location Overlay */}
                      <div className="absolute bottom-8 left-8 right-8">
                        <p className="flex items-center gap-2 text-blue-400 text-xs font-bold uppercase tracking-[0.2em] mb-2">
                          <Icons.Map /> {act.location}
                        </p>
                        <h2 className="text-3xl font-bold text-white leading-tight">
                          {act.title}
                        </h2>
                      </div>
                    </div>

                    <div className="p-8 flex items-center justify-between border-t border-slate-100 bg-white">
                      <div className="flex items-center gap-4 text-slate-400 font-bold text-sm">
                        <span className="flex items-center gap-1.5 text-yellow-500">
                          <Icons.Star /> {act.rating}
                        </span>
                        <span className="flex items-center gap-1.5">
                          <Icons.Clock /> 4h
                        </span>
                      </div>
                      
                      <button className="btn-book bg-slate-900 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold text-sm transition-all flex items-center gap-2 shadow-sm">
                        <Icons.Ticket /> Book Now
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Empty State */}
            {!isLoading && filteredActivities.length === 0 && (
              <div className="text-center py-40">
                <h3 className="text-4xl font-bold text-zinc-800 mb-4">No activities found</h3>
                <p className="text-zinc-600 font-medium">Try broadening your search or switching categories.</p>
              </div>
            )}
          </div>

          {/* AI Curator Bar */}
          <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-[90%] max-w-3xl z-40">
            <div className="bg-white/90 backdrop-blur-2xl border border-slate-200 p-6 rounded-[2rem] shadow-2xl flex flex-col sm:flex-row items-center justify-between gap-6">
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 ai-glow rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                  ✨
                </div>
                <div>
                  <p className="text-xs font-bold text-blue-600 uppercase tracking-widest">AI Recommendation</p>
                  <p className="font-medium text-slate-700">"Based on your interest in History, you'd love the Old City Night Walk."</p>
                </div>
              </div>
              <button className="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold text-sm hover:scale-105 transition-transform shrink-0 shadow-lg shadow-slate-900/10">
                Show More AI Picks
              </button>
            </div>
          </div>

          {/* Navigation Back */}
          <div className="fixed bottom-10 right-10 z-50">
            <button 
                onClick={() => window.location.href = 'dashboard.html'}
                className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-2 group shadow-blue-500/20"
            >
              <svg className="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
              Dashboard
            </button>
          </div>

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ActivityExplorer />);
  </script>
</body>
</html>
