<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium My Trips - Global Destinations</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(37, 99, 235, 0.2);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(37, 99, 235, 0.4);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-fade-in-up {
      animation: fadeInUp 0.5s ease-out forwards;
    }

    @keyframes blob {
      0% {
        transform: translate(0px, 0px) scale(1);
      }

      33% {
        transform: translate(30px, -50px) scale(1.1);
      }

      66% {
        transform: translate(-20px, 20px) scale(0.9);
      }

      100% {
        transform: translate(0px, 0px) scale(1);
      }
    }

    .animate-blob {
      animation: blob 7s infinite;
    }

    .animation-delay-2000 {
      animation-delay: 2s;
    }

    .animation-delay-4000 {
      animation-delay: 4s;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 4px;
    }
  </style>
</head>

<body
  class="min-h-screen bg-slate-50 font-sans relative flex flex-col antialiased selection:bg-blue-200 selection:text-blue-900 overflow-x-hidden">

  <!-- Shared Header -->
  <header class="relative z-50 flex justify-between items-center px-6 sm:px-12 h-20 bg-white/80 backdrop-blur-md border-b border-slate-100">
    <a href="index.html" class="flex items-center gap-2 group">
      <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/20 group-hover:scale-110 transition-transform">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6">
          <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z" fill="currentColor" stroke="none" />
        </svg>
      </div>
      <span class="text-xl font-extrabold tracking-tight text-slate-900">travel<span class="text-blue-600">oop</span></span>
    </a>
    <nav class="hidden md:flex items-center gap-8">
      <a href="dashboard.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Dashboard</a>
      <a href="my-trips.html" class="text-sm font-bold text-blue-600">My Trips</a>
      <a href="explore.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Explore</a>
      <a href="budget.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Budget</a>
      <a href="Packingchecklistscreen.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Packing</a>
      <a href="Activitysearch.html" class="text-sm font-bold text-slate-600 hover:text-blue-600 transition-colors">Activities</a>
    </nav>
    <div class="flex items-center gap-4">
      <a href="profile.html" class="w-10 h-10 rounded-full bg-slate-100 border border-slate-200 flex items-center justify-center text-slate-600 hover:bg-white hover:shadow-md transition-all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="w-5 h-5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </a>
    </div>
  </header>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Massive Global Destinations List
    const destinations = {
      'USA': ['New York City', 'San Francisco', 'Miami', 'Las Vegas', 'Honolulu', 'Chicago', 'Los Angeles'],
      'Canada': ['Toronto', 'Vancouver', 'Montreal', 'Banff'],
      'Mexico': ['Mexico City', 'Cancun', 'Tulum', 'Oaxaca'],
      'Brazil': ['Rio de Janeiro', 'São Paulo', 'Salvador'],
      'Argentina': ['Buenos Aires', 'Mendoza', 'Patagonia'],
      'Peru': ['Cusco', 'Lima'],
      'Colombia': ['Medellin', 'Cartagena'],
      'France': ['Paris', 'Nice', 'Lyon', 'Bordeaux'],
      'Italy': ['Rome', 'Venice', 'Florence', 'Milan', 'Amalfi Coast'],
      'Spain': ['Barcelona', 'Madrid', 'Seville', 'Ibiza'],
      'UK': ['London', 'Edinburgh', 'Manchester', 'Bath'],
      'Germany': ['Berlin', 'Munich', 'Hamburg', 'Frankfurt'],
      'Greece': ['Santorini', 'Athens', 'Mykonos', 'Crete'],
      'Switzerland': ['Zurich', 'Geneva', 'Lucerne', 'Interlaken'],
      'Netherlands': ['Amsterdam', 'Rotterdam', 'Utrecht'],
      'Portugal': ['Lisbon', 'Porto', 'Algarve'],
      'Japan': ['Tokyo', 'Kyoto', 'Osaka', 'Hokkaido'],
      'India': ['Mumbai', 'Delhi', 'Jaipur', 'Goa', 'Kerala'],
      'China': ['Beijing', 'Shanghai', 'Hong Kong'],
      'Thailand': ['Bangkok', 'Phuket', 'Chiang Mai', 'Koh Samui'],
      'Indonesia': ['Bali', 'Jakarta', 'Komodo'],
      'Vietnam': ['Hanoi', 'Ho Chi Minh City', 'Da Nang'],
      'South Korea': ['Seoul', 'Busan', 'Jeju'],
      'UAE': ['Dubai', 'Abu Dhabi'],
      'Turkey': ['Istanbul', 'Cappadocia', 'Antalya'],
      'Egypt': ['Cairo', 'Luxor', 'Alexandria'],
      'South Africa': ['Cape Town', 'Johannesburg', 'Kruger'],
      'Morocco': ['Marrakech', 'Casablanca', 'Fes'],
      'Kenya': ['Nairobi', 'Mombasa', 'Maasai Mara'],
      'Australia': ['Sydney', 'Melbourne', 'Gold Coast', 'Perth'],
      'New Zealand': ['Auckland', 'Queenstown', 'Wellington']
    };

    // Premium High-Res Unsplash Images for specific top cities
    const premiumImages = {
      'Paris': 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800&q=80',
      'Tokyo': 'https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&w=800&q=80',
      'New York City': 'https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?auto=format&fit=crop&w=800&q=80',
      'London': 'https://images.unsplash.com/photo-1513635269975-5969336cd1f3?auto=format&fit=crop&w=800&q=80',
      'Rome': 'https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=800&q=80',
      'Bali': 'https://images.unsplash.com/photo-1537996194471-e657df975ab4?auto=format&fit=crop&w=800&q=80',
      'Dubai': 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=800&q=80',
      'Santorini': 'https://images.unsplash.com/photo-1613395877344-13d4a8e0d49e?auto=format&fit=crop&w=800&q=80',
      'Cape Town': 'https://images.unsplash.com/photo-1580060839134-75a5edca2e99?auto=format&fit=crop&w=800&q=80',
      'Sydney': 'https://images.unsplash.com/photo-1506973035872-a4ec16b8e8d9?auto=format&fit=crop&w=800&q=80',
      'Barcelona': 'https://images.unsplash.com/photo-1583422409516-15eba53448ad?auto=format&fit=crop&w=800&q=80',
      'Amsterdam': 'https://images.unsplash.com/photo-1534351590666-13e3e96b5017?auto=format&fit=crop&w=800&q=80',
      'Kyoto': 'https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&w=800&q=80'
    };

    const resolveCityImage = (cityName) => {
      if (premiumImages[cityName]) return premiumImages[cityName];
      // AI Image Generation Fetcher Fallback
      return `https://loremflickr.com/800/600/${encodeURIComponent(cityName)},landmark/all?lock=${Math.floor(Math.random() * 10000)}`;
    };

    const fallbackImages = [
      'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?auto=format&fit=crop&w=800&q=80',
      'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=800&q=80'
    ];

    const initialTrips = [
      {
        id: 1,
        name: 'Summer in Europe',
        startDate: '10 May',
        endDate: '15 May',
        citiesCount: 4,
        status: 'Upcoming',
        imageUrl: resolveCityImage('Paris'),
      },
      {
        id: 2,
        name: 'Japan Adventure',
        startDate: '01 Oct',
        endDate: '14 Oct',
        citiesCount: 5,
        status: 'Upcoming',
        imageUrl: resolveCityImage('Tokyo'),
      },
      {
        id: 3,
        name: 'Weekend Getaway',
        startDate: '20 Jul',
        endDate: '22 Jul',
        citiesCount: 1,
        status: 'Completed',
        imageUrl: resolveCityImage('Rome'),
      }
    ];

    const MyTrips = () => {
      // Core State
      const [trips, setTrips] = useState(() => {
        const saved = localStorage.getItem('globalTrips');
        if (saved) return JSON.parse(saved);
        return initialTrips;
      });

      // Sync to localStorage
      useEffect(() => {
        localStorage.setItem('globalTrips', JSON.stringify(trips));
      }, [trips]);
      const [statusFilter, setStatusFilter] = useState('All');

      // Modal State
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isAnimating, setIsAnimating] = useState(false);

      // AI Chat State
      const [isAIChatOpen, setIsAIChatOpen] = useState(false);
      const [chatMessages, setChatMessages] = useState([
        { role: 'ai', text: 'Hi! I am your AI Travel Assistant. The entire globe is available to you! Shall I suggest an incredible adventure?' }
      ]);
      const chatEndRef = useRef(null);

      // Form State
      const [formData, setFormData] = useState({
        name: '',
        city: '',
        customCity: '',
        startDate: '',
        endDate: '',
        citiesCount: '',
        status: 'Upcoming'
      });
      const [errors, setErrors] = useState({});

      useEffect(() => {
        if (isModalOpen) {
          requestAnimationFrame(() => setIsAnimating(true));
        } else {
          setIsAnimating(false);
        }
      }, [isModalOpen]);

      useEffect(() => {
        if (chatEndRef.current) {
          chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [chatMessages]);

      const filteredTrips = trips.filter(t => statusFilter === 'All' || t.status === statusFilter);

      const handleDelete = (id, e) => {
        e.stopPropagation();
        if (window.confirm('Are you sure you want to delete this trip?')) {
          setTrips(trips.filter(t => t.id !== id));
        }
      };

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));

        if (name === 'city' && value !== 'Other' && !formData.name) {
          const selectedCityName = value.split(',')[0];
          setFormData(prev => ({ ...prev, name: `Trip to ${selectedCityName}` }));
        }

        if (errors[name]) {
          setErrors(prev => ({ ...prev, [name]: '' }));
        }
      };

      const handleAISuggestion = () => {
        const countries = Object.keys(destinations);
        const randomCountry = countries[Math.floor(Math.random() * countries.length)];
        const cities = destinations[randomCountry];
        const randomCity = cities[Math.floor(Math.random() * cities.length)];

        const start = new Date();
        start.setDate(start.getDate() + Math.floor(Math.random() * 30) + 10);
        const end = new Date(start);
        end.setDate(end.getDate() + Math.floor(Math.random() * 7) + 3);

        const formatOptions = { day: '2-digit', month: 'short' };

        const newTrip = {
          id: Date.now(),
          name: `AI Suggested: ${randomCity}`,
          startDate: start.toLocaleDateString('en-GB', formatOptions),
          endDate: end.toLocaleDateString('en-GB', formatOptions),
          citiesCount: Math.floor(Math.random() * 3) + 1,
          status: 'Upcoming',
          imageUrl: resolveCityImage(randomCity)
        };

        setChatMessages(prev => [
          ...prev,
          { role: 'user', text: 'Suggest an incredible trip anywhere in the world!' },
          { role: 'ai', text: `I've added a phenomenal trip to ${randomCity}, ${randomCountry} to your dashboard! Check out the amazing photo!` }
        ]);

        setTrips([newTrip, ...trips]);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const newErrors = {};
        let isValid = true;

        if (!formData.name || formData.name.trim().length < 3) {
          newErrors.name = 'Please enter a valid trip name (min 3 characters).';
          isValid = false;
        }
        if (!formData.city) {
          newErrors.city = 'Please select a destination.';
          isValid = false;
        }
        if (formData.city === 'Other' && (!formData.customCity || formData.customCity.trim().length < 2)) {
          newErrors.customCity = 'Please enter the custom city name.';
          isValid = false;
        }
        if (!formData.startDate) {
          newErrors.startDate = 'Start date is required.';
          isValid = false;
        }
        if (!formData.endDate) {
          newErrors.endDate = 'End date is required.';
          isValid = false;
        }
        if (formData.startDate && formData.endDate) {
          const d1 = new Date(formData.startDate);
          const d2 = new Date(formData.endDate);
          if (d1 > d2) {
            newErrors.endDate = 'End date must be after start date.';
            isValid = false;
          }
        }
        const cities = parseInt(formData.citiesCount);
        if (isNaN(cities) || cities < 1) {
          newErrors.citiesCount = 'Must be a valid number (min 1).';
          isValid = false;
        }

        setErrors(newErrors);

        if (isValid) {
          const formatOptions = { day: '2-digit', month: 'short' };
          const formattedStart = new Date(formData.startDate).toLocaleDateString('en-GB', formatOptions);
          const formattedEnd = new Date(formData.endDate).toLocaleDateString('en-GB', formatOptions);

          let resolvedImage = '';
          if (formData.city !== 'Other') {
            const selectedCityName = formData.city.split(',')[0];
            resolvedImage = resolveCityImage(selectedCityName);
          } else {
            resolvedImage = resolveCityImage(formData.customCity.trim());
          }

          const newTrip = {
            id: Date.now(),
            name: formData.name.trim(),
            startDate: formattedStart,
            endDate: formattedEnd,
            citiesCount: cities,
            status: formData.status,
            imageUrl: resolvedImage
          };

          setTrips([newTrip, ...trips]);
          closeModal();
        }
      };

      const closeModal = () => {
        setIsAnimating(false);
        setTimeout(() => {
          setIsModalOpen(false);
          setFormData({
            name: '',
            city: '',
            customCity: '',
            startDate: '',
            endDate: '',
            citiesCount: '',
            status: 'Upcoming'
          });
          setErrors({});
        }, 300);
      };

      return (
        <React.Fragment>
          {/* Stunning Animated Blob Backgrounds */}
          <div className="fixed top-[-10%] left-[-10%] w-[40rem] h-[40rem] bg-blue-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob z-0 pointer-events-none"></div>
          <div className="fixed top-[20%] right-[-10%] w-[40rem] h-[40rem] bg-indigo-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-2000 z-0 pointer-events-none"></div>
          <div className="fixed bottom-[-20%] left-[20%] w-[40rem] h-[40rem] bg-cyan-200 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-blob animation-delay-4000 z-0 pointer-events-none"></div>

          {/* Subtle SVG Noise Texture */}
          <div className="fixed inset-0 opacity-[0.10] pointer-events-none mix-blend-multiply bg-noise z-0"></div>

          {/* Hero Header & Nav */}
          <div className="relative z-10 max-w-7xl mx-auto px-6 pt-16 sm:px-12 w-full flex flex-col sm:flex-row justify-between items-center gap-6 animate-fade-in-up">
            <div className="text-center sm:text-left">
              <h1 className="text-5xl sm:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-800 via-indigo-600 to-cyan-600 tracking-tight mb-3 drop-shadow-sm">
                Global Trips
              </h1>
              <p className="text-blue-600 text-lg sm:text-xl font-medium tracking-wide">
                Discover the world. Plan your next extraordinary adventure.
              </p>
            </div>

            <button onClick={() => setIsModalOpen(true)} className="group flex items-center space-x-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 py-4 rounded-2xl font-bold transition-all duration-300 shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:shadow-[0_8px_25px_rgba(37,99,235,0.3)] hover:-translate-y-1 text-lg">
              <svg className="w-6 h-6 text-blue-200 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
              <span>Plan New Trip</span>
            </button>
          </div>

          {/* Main Content Area */}
          <div className="relative z-10 max-w-7xl mx-auto px-6 py-12 sm:px-12 w-full flex-grow">

            {/* Status Filter Tabs */}
            <div className="flex space-x-3 mb-10 animate-fade-in-up justify-center sm:justify-start">
              {['All', 'Upcoming', 'Completed'].map(status => (
                <button
                  key={status}
                  onClick={() => setStatusFilter(status)}
                  className={`px-6 py-2.5 rounded-full font-bold transition-all duration-300 text-sm ${statusFilter === status ? 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white shadow-lg shadow-blue-500/30' : 'bg-white/80 text-blue-800 hover:bg-white border border-blue-100 backdrop-blur-md shadow-sm'}`}
                >
                  {status}
                </button>
              ))}
            </div>

            {/* Trips Grid */}
            {filteredTrips.length === 0 ? (
              <div className="flex flex-col items-center justify-center h-64 text-center mt-4 animate-fade-in-up bg-white/40 backdrop-blur-md rounded-3xl border border-white p-8">
                <div className="w-24 h-24 bg-gradient-to-tr from-blue-100 to-indigo-100 rounded-full flex items-center justify-center mb-6 border border-white shadow-sm">
                  <svg className="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 className="text-3xl font-extrabold text-blue-900 mb-3">No trips found</h3>
                <p className="text-blue-600 text-lg">Start planning your next adventure around the world to see it here.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                {filteredTrips.map((trip) => (
                  <div key={trip.id} className="group relative rounded-[2.5rem] overflow-hidden bg-white/80 backdrop-blur-[20px] border border-white shadow-[0_8px_30px_rgba(0,0,0,0.04)] transition-all duration-500 hover:scale-[1.03] hover:bg-white hover:shadow-[0_30px_60px_rgba(37,99,235,0.15)] flex flex-col cursor-pointer animate-fade-in-up">

                    <div className="relative h-72 w-full overflow-hidden shrink-0">
                      <div className="absolute inset-0 bg-gradient-to-t from-blue-900/90 via-blue-900/20 to-transparent z-10 group-hover:from-indigo-900/95 transition-colors duration-500"></div>

                      <img
                        src={trip.imageUrl}
                        alt={trip.name}
                        className="w-full h-full object-cover transform group-hover:scale-110 group-hover:rotate-1 transition-transform duration-700 ease-out"
                        onError={(e) => { e.target.src = fallbackImages[0] }}
                      />

                      {/* Interactive Status Indicator on Card */}
                      <div className="absolute top-6 right-6 z-20 flex items-center bg-white/95 backdrop-blur-md px-4 py-2 rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.1)] border border-white/50">
                        <span className={`w-2 h-2 rounded-full mr-2.5 shadow-[0_0_8px_currentColor] animate-pulse ${trip.status === 'Upcoming' ? 'bg-blue-500 text-blue-500' : 'bg-gray-400 text-gray-400'}`}></span>
                        <span className="text-[11px] font-extrabold text-blue-900 tracking-widest uppercase">{trip.status}</span>
                      </div>

                      <div className="absolute bottom-7 left-7 z-20 pr-4">
                        <h3 className="text-3xl font-bold text-white tracking-wide drop-shadow-lg leading-tight">{trip.name}</h3>
                      </div>
                    </div>

                    <div className="p-7 flex-grow flex items-center justify-between relative bg-gradient-to-b from-white/50 to-transparent">
                      <div className="flex flex-col gap-y-3 text-blue-900/80">
                        <div className="flex items-center">
                          <div className="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mr-3 border border-blue-100">
                            <svg className="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                          </div>
                          <span className="text-sm font-bold tracking-wide whitespace-nowrap">{trip.startDate} - {trip.endDate}</span>
                        </div>
                        <div className="flex items-center">
                          <div className="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center mr-3 border border-blue-100">
                            <svg className="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                          </div>
                          <span className="text-sm font-bold tracking-wide">{trip.citiesCount} {trip.citiesCount === 1 ? 'Destination' : 'Destinations'}</span>
                        </div>
                      </div>

                      <div className="flex items-center space-x-2 bg-white/95 backdrop-blur-xl p-2 rounded-2xl border border-blue-50 opacity-100 lg:opacity-0 lg:translate-x-3 group-hover:opacity-100 group-hover:translate-x-0 transition-all duration-300 ease-out shadow-xl">
                        <button onClick={(e) => { e.stopPropagation(); window.location.href = `viewscreen.html?id=${trip.id}`; }} className="p-3 rounded-xl text-blue-400 hover:text-blue-700 hover:bg-blue-50 transition-colors" title="View">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                        <button onClick={(e) => handleDelete(trip.id, e)} className="p-3 rounded-xl text-red-400 hover:text-red-600 hover:bg-red-50 transition-all duration-300 hover:shadow-[0_0_15px_rgba(248,113,113,0.3)]" title="Delete">
                          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* AI Chatbot Floating Widget */}
          <button
            onClick={() => setIsAIChatOpen(!isAIChatOpen)}
            className="fixed bottom-8 right-8 z-40 bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-5 rounded-full shadow-2xl hover:shadow-[0_0_30px_rgba(37,99,235,0.6)] transition-all flex items-center justify-center hover:scale-110"
            title="AI Travel Assistant"
          >
            <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
          </button>

          {isAIChatOpen && (
            <div className="fixed bottom-28 right-8 w-80 sm:w-96 bg-white/95 backdrop-blur-2xl border border-white rounded-[2rem] shadow-[0_20px_60px_rgba(37,99,235,0.2)] z-50 overflow-hidden flex flex-col transition-all duration-300 animate-fade-in-up">
              <div className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-5 font-bold flex justify-between items-center shadow-md relative overflow-hidden">
                <div className="absolute inset-0 bg-white/10 mix-blend-overlay"></div>
                <span className="flex items-center relative z-10 text-lg">
                  <svg className="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" /></svg>
                  AI Travel Guide
                </span>
                <button onClick={() => setIsAIChatOpen(false)} className="hover:text-blue-200 transition-colors relative z-10">
                  <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
              </div>
              <div className="p-5 flex-grow h-72 overflow-y-auto flex flex-col space-y-4 chat-scroll bg-gradient-to-b from-blue-50/50 to-white">
                {chatMessages.map((msg, i) => (
                  <div key={i} className={`p-4 rounded-2xl max-w-[85%] shadow-sm ${msg.role === 'ai' ? 'bg-white text-blue-900 self-start rounded-tl-sm border border-blue-50' : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white self-end rounded-tr-sm'}`}>
                    <p className="text-sm font-semibold leading-relaxed">{msg.text}</p>
                  </div>
                ))}
                <div ref={chatEndRef} />
              </div>
              <div className="p-5 border-t border-blue-50 bg-white">
                <button
                  onClick={handleAISuggestion}
                  className="w-full bg-blue-50 hover:bg-blue-100 text-blue-800 font-extrabold py-3.5 rounded-xl transition-all text-sm flex items-center justify-center border border-blue-200 hover:shadow-md"
                >
                  <svg className="w-5 h-5 mr-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                  Plan a Surprise Global Trip!
                </button>
              </div>
            </div>
          )}

          {/* Create Trip Form Modal */}
          {isModalOpen && (
            <div className={`fixed inset-0 z-50 flex items-center justify-center px-4 transition-opacity duration-300 ${isAnimating ? 'opacity-100' : 'opacity-0'}`}>
              <div className="absolute inset-0 bg-blue-900/40 backdrop-blur-md" onClick={closeModal}></div>

              <div className={`relative bg-white/95 backdrop-blur-2xl border border-white rounded-[2.5rem] shadow-[0_30px_80px_-15px_rgba(37,99,235,0.4)] w-full max-w-xl p-8 sm:p-12 transform transition-transform duration-300 ${isAnimating ? 'scale-100' : 'scale-95'}`}>
                <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-800 to-indigo-600 mb-8 flex items-center">
                  <svg className="w-8 h-8 mr-3 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>
                  Add New Destination
                </h2>

                <form onSubmit={handleSubmit} noValidate>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
                    {/* Trip Name */}
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">Trip Name</label>
                      <input
                        type="text"
                        name="name"
                        value={formData.name}
                        onChange={handleInputChange}
                        className={`w-full bg-blue-50/50 border rounded-2xl px-5 py-3.5 text-blue-900 font-medium placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all ${errors.name ? 'border-red-500' : 'border-blue-200'}`}
                        placeholder="e.g. Honeymoon"
                      />
                      {errors.name && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.name}</p>}
                    </div>

                    {/* Destination City Dropdown with Extensive Country Groupings */}
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">Destination</label>
                      <div className="relative">
                        <select
                          name="city"
                          value={formData.city}
                          onChange={handleInputChange}
                          className={`w-full bg-blue-50/50 border rounded-2xl px-5 py-3.5 text-blue-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none cursor-pointer ${errors.city ? 'border-red-500' : 'border-blue-200'}`}
                        >
                          <option value="" disabled>Select a city...</option>
                          {Object.entries(destinations).map(([country, cities]) => (
                            <optgroup key={country} label={country} className="font-bold text-blue-900">
                              {cities.map(c => (
                                <option key={c} value={`${c}, ${country}`} className="font-medium">{c}</option>
                              ))}
                            </optgroup>
                          ))}
                          <option value="Other" className="font-bold text-indigo-600">Other / Anywhere Else</option>
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-blue-500">
                          <svg className="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                      </div>
                      {errors.city && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.city}</p>}
                    </div>
                  </div>

                  {/* AI Custom Image Field */}
                  {formData.city === 'Other' && (
                    <div className="mb-6 animate-fade-in-up bg-indigo-50/50 p-4 rounded-2xl border border-indigo-100">
                      <label className="block text-sm font-bold text-indigo-800 mb-2 flex items-center">
                        <svg className="w-5 h-5 mr-1.5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                        Custom Destination (AI Image Match)
                      </label>
                      <input
                        type="text"
                        name="customCity"
                        value={formData.customCity}
                        onChange={handleInputChange}
                        className={`w-full bg-white border rounded-xl px-5 py-3 text-indigo-900 font-medium placeholder-indigo-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all ${errors.customCity ? 'border-red-500' : 'border-indigo-200'}`}
                        placeholder="e.g. Prague, Cairo, Oslo..."
                      />
                      {errors.customCity && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.customCity}</p>}
                    </div>
                  )}

                  {/* Dates */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-6">
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">Start Date</label>
                      <input
                        type="date"
                        name="startDate"
                        value={formData.startDate}
                        onChange={handleInputChange}
                        className={`w-full bg-blue-50/50 border rounded-2xl px-5 py-3.5 text-blue-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm ${errors.startDate ? 'border-red-500' : 'border-blue-200'}`}
                      />
                      {errors.startDate && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.startDate}</p>}
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">End Date</label>
                      <input
                        type="date"
                        name="endDate"
                        value={formData.endDate}
                        onChange={handleInputChange}
                        className={`w-full bg-blue-50/50 border rounded-2xl px-5 py-3.5 text-blue-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-sm ${errors.endDate ? 'border-red-500' : 'border-blue-200'}`}
                      />
                      {errors.endDate && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.endDate}</p>}
                    </div>
                  </div>

                  {/* Cities & Status */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-10">
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">Number of Stops</label>
                      <input
                        type="number"
                        name="citiesCount"
                        value={formData.citiesCount}
                        onChange={handleInputChange}
                        className={`w-full bg-blue-50/50 border rounded-2xl px-5 py-3.5 text-blue-900 font-medium placeholder-blue-300 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all ${errors.citiesCount ? 'border-red-500' : 'border-blue-200'}`}
                        placeholder="1"
                      />
                      {errors.citiesCount && <p className="text-red-500 text-xs mt-1.5 ml-1 font-semibold">{errors.citiesCount}</p>}
                    </div>
                    <div>
                      <label className="block text-sm font-bold text-blue-800 mb-2 ml-1">Status</label>
                      <div className="relative">
                        <select
                          name="status"
                          value={formData.status}
                          onChange={handleInputChange}
                          className="w-full bg-blue-50/50 border border-blue-200 rounded-2xl px-5 py-3.5 text-blue-900 font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all appearance-none cursor-pointer"
                        >
                          <option value="Upcoming">Upcoming</option>
                          <option value="Completed">Completed</option>
                        </select>
                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-blue-500">
                          <svg className="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* Actions */}
                  <div className="flex justify-end space-x-4">
                    <button type="button" onClick={closeModal} className="px-8 py-4 rounded-2xl text-blue-600 hover:text-blue-900 hover:bg-blue-100 transition-colors font-bold text-lg">Cancel</button>
                    <button type="submit" className="px-8 py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold text-lg transition-all shadow-[0_4px_14px_0_rgba(37,99,235,0.39)] hover:shadow-[0_8px_25px_rgba(37,99,235,0.3)] hover:-translate-y-1 flex items-center">
                      Save Trip
                      <svg className="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}
          {/* Floating Dashboard Button */}
          <div className="fixed bottom-10 right-10 z-50">
            <button 
                onClick={() => window.location.href = 'dashboard.html'}
                className="bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold shadow-2xl hover:bg-blue-600 transition-all flex items-center gap-2 group shadow-blue-500/20"
            >
              <svg className="w-5 h-5 group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7" />
              </svg>
              Dashboard
            </button>
          </div>
        </React.Fragment>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MyTrips />);
  </script>
</body>

</html>
